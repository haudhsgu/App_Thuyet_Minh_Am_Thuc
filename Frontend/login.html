<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - TrackingFoods</title>
  <link rel="stylesheet" href="style.css?v=4">
  <style>
    body {
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(circle at 10% 20%, rgba(255, 122, 0, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(81, 43, 212, 0.08) 0%, transparent 40%);
    }
    .login-container {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      color: var(--primary-color);
      font-size: 24px;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .login-header p {
      color: var(--text-gray);
      font-size: 13px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-gray);
    }
    .form-control {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-white);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(255, 122, 0, 0.25);
    }
    .login-btn,
    .register-nav-btn {
      width: 100%;
      padding: 14px;
      font-size: 14px;
    }

    .register-nav-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .register-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: #3e3e50;
    }

    .register-nav-btn:hover {
      text-decoration: none;
    }

    .error-msg {
      color: #ff3333;
      font-size: 13px;
      text-align: center;
      margin-top: 15px;
      min-height: 20px;
    }

    .home-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: var(--text-gray);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></canvas>
  <div class="login-container">
    <div class="login-header">
      <h2>TrackingFoods</h2>
      <p>Trang đăng nhập dành riêng cho Chủ Quán và Quản trị viên.<br><small style="color:#6b7280;">Khách hàng vui lòng sử dụng trang Bản đồ chính.</small></p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
      </div>

      <button type="submit" class="btn login-btn">Đăng Nhập</button>
      <div class="error-msg" id="error-message"></div>
    </form>

    <div class="register-nav-group" style="grid-template-columns: 1fr;">
      <a href="register-owner.html" class="btn register-nav-btn">Đăng ký tài khoản Chủ Quán</a>
    </div>

    <a href="index.html" class="home-link">← Quay về Trang chủ Bản đồ</a>
  </div>

  <script src="login.js"></script>
  <script src="particles.js"></script>
</body>
</html>
