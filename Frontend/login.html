<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Hệ thống Quản trị & Chủ Quán</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(circle at 10% 20%, rgba(255, 122, 0, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(81, 43, 212, 0.08) 0%, transparent 40%);
    }
    .login-container {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      color: var(--primary-color);
      font-size: 24px;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .login-header p {
      color: var(--text-gray);
      font-size: 13px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-gray);
    }
    .form-control {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-white);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(255, 122, 0, 0.25);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 14px;
      margin-top: 10px;
    }
    .error-msg {
      color: #ff3333;
      font-size: 13px;
      text-align: center;
      margin-top: 15px;
      min-height: 20px;
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-gray);
    }
    .register-link a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
    .home-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: var(--text-gray);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h2>ỐC QUẬN 4</h2>
      <p>Cổng Quản trị & Chủ Cửa hàng Thuyết Minh</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
      </div>

      <button type="submit" class="btn login-btn">Đăng Nhập</button>

      <div class="error-msg" id="error-message"></div>
    </form>

    <div class="register-link">
      Bạn là chủ quán mới? <a href="register-owner.html">Đăng ký ngay</a>
    </div>

    <a href="index.html" class="home-link">← Quay về Trang chủ Bản đồ</a>
  </div>

  <script src="login.js"></script>
</body>
</html>
